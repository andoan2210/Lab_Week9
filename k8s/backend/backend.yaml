apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  default.conf: |
    server {
      listen 80;
      location / {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","message":"Hello from Backend","version":"v1"}';
      }
      location /healthz {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: config
          configMap:
            name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
